name: Mobile Builds

on:
  push:
    branches: [main, release/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SWS_App
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: SWS_App/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: npm ci
      - run: npm run build:mobile
        env:
          VITE_BUILD_TARGET: mobile

      - run: npx cap sync android

      # ---- PR path: unsigned verify build only (no secrets, no AAB upload) ----
      - name: Build (PR — unsigned verify)
        if: github.event_name == 'pull_request'
        working-directory: SWS_App/android
        run: ./gradlew assembleDebug

      # ---- Push / workflow_dispatch path: publish signed AAB to Play Console ----
      - name: Decode keystore
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Publish to Play Console (Closed group V0.0.5)
        if: github.event_name != 'pull_request'
        working-directory: SWS_App/android
        env:
          ANDROID_PUBLISHER_CREDENTIALS: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          ./gradlew publishReleaseBundle \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/SWS_App/android/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

  ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: SWS_App
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: SWS_App/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npx cap sync ios

      - name: Check signing secrets
        id: check-signing-secrets
        env:
          CERT: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
        run: |
          if [[ -z "$CERT" ]]; then
            echo "iOS signing secrets not configured — skipping signing and build steps"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install certificate and provisioning profile
        if: steps.check-signing-secrets.outputs.available == 'true'
        env:
          CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings build.keychain

          echo "$CERTIFICATE_P12" | base64 -d > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 -d \
            > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build IPA
        if: steps.check-signing-secrets.outputs.available == 'true'
        working-directory: SWS_App/ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist

      - uses: actions/upload-artifact@v4
        if: steps.check-signing-secrets.outputs.available == 'true'
        with:
          name: ios-ipa
          path: SWS_App/ios/App/build/ipa/App.ipa
