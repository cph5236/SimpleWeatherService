name: CI

on:
  push:
  pull_request:
    branches: [main, release/*]

defaults:
  run:
    working-directory: SWS_App

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: SWS_App/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint:fix && git diff --exit-code

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test -- --run
